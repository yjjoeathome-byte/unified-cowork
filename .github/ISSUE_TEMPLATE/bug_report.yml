name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Python 3.8
        - Python 3.9
        - Python 3.10
        - Python 3.11
        - Python 3.12
        - Python 3.13+
        - PowerShell 7
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: check-output
    attributes:
      label: Output of --check
      description: "Run `python3 cowork_sync.py --check` and paste the output here."
      render: text
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config (redacted)
      description: "Paste your config.json with paths and credentials redacted."
      render: json
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: false
